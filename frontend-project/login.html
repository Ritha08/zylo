<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSSMS Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Force black background and neon colors */
        body {
            background-color: #000000;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }
        /* custom neon glow effects */
        .neon-card {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        .neon-input {
            background: #111;
            border: 1px solid #333;
            transition: all 0.2s ease;
            color: #0ff;
        }
        .neon-input:focus {
            border-color: #0ff;
            box-shadow: 0 0 8px #0ff;
            outline: none;
        }
        .neon-button {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border: none;
            transition: 0.2s;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .neon-button:hover {
            box-shadow: 0 0 12px #00c6ff;
            transform: scale(1.02);
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #222;
            transition: 0.3s;
            border-radius: 26px;
            border: 1px solid #0ff;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 2px;
            background-color: #0ff;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #0ff;
        }
        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: #000;
        }
        .demo-text {
            color: #888;
            font-size: 0.75rem;
        }
        .demo-text span {
            color: #0ff;
            font-weight: 500;
        }
    </style>
</head>
<body class="bg-black">

<div class="min-h-screen flex items-center justify-center px-4">
    <div class="neon-card rounded-2xl p-8 w-full max-w-md">
        <div class="flex justify-between items-center mb-2">
            <h2 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">PSSMS</h2>
            <label class="toggle-switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
        <p class="text-center text-gray-400 mb-6">Parking Space Sales Management System</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" class="neon-input w-full mb-4 p-3 rounded-lg" required>
            <input type="password" id="password" placeholder="Password" class="neon-input w-full mb-4 p-3 rounded-lg" required autocomplete="off">
            <div id="errorMsg" class="text-red-400 text-sm mb-4 hidden"></div>
            <button type="submit" class="neon-button w-full text-white py-3 rounded-lg font-semibold tracking-wider">Login</button>
        </form>
        <div class="flex justify-center gap-6 mt-6 demo-text">
            <div>admin / <span>admin123</span></div>
            <div>manager / <span>manager123</span></div>
        </div>
    </div>
</div>

<script>
    const users = {
        admin: { username: "admin", password: "admin123", role: "admin" },
        manager: { username: "manager", password: "manager123", role: "manager" }
    };
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('pssms_theme') === 'dark') {
        document.documentElement.classList.add('dark');
        themeToggle.checked = true;
    } else {
        // ensure dark mode on by default for black theme
        document.documentElement.classList.add('dark');
        localStorage.setItem('pssms_theme', 'dark');
        themeToggle.checked = true;
    }
    themeToggle.addEventListener('change', (e) => {
        if (e.target.checked) {
            document.documentElement.classList.add('dark');
            localStorage.setItem('pssms_theme', 'dark');
        } else {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('pssms_theme', 'light');
        }
    });
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const user = users[username];
        if (user && user.password === password) {
            localStorage.setItem('pssms_current_user', JSON.stringify({ username: user.username, role: user.role }));
            window.location.href = 'dashboard.html';
        } else {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = 'Invalid credentials';
            errorDiv.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
