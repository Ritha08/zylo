<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSSMS Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .glass-card {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }
        .neon-input {
            background: #111;
            border: 1px solid #2a2a2a;
            color: #0ff;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.2s;
        }
        .neon-input:focus {
            border-color: #0ff;
            box-shadow: 0 0 12px #0ff;
            outline: none;
        }
        .neon-button {
            background: linear-gradient(95deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            color: white;
            transition: 0.2s;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0,198,255,0.5);
        }
        .neon-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #00c6ff;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #222;
            transition: 0.3s;
            border-radius: 26px;
            border: 1px solid #0ff;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 2px;
            background-color: #0ff;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #0ff;
        }
        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: #000;
        }
        .demo-text { color: #aaa; font-size: 0.75rem; }
        .demo-text span { color: #0ff; font-weight: 500; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-card max-w-md w-full p-8">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">PSSMS</h1>
            <label class="toggle-switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
        <p class="text-center text-gray-400 mb-8">Parking Space Sales Management System</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" class="neon-input w-full mb-4" required autocomplete="off">
            <input type="password" id="password" placeholder="Password" class="neon-input w-full mb-6" required autocomplete="off">
            <div id="errorMsg" class="text-red-400 text-sm mb-4 hidden"></div>
            <button type="submit" class="neon-button w-full">Login</button>
        </form>
        <div class="flex justify-center gap-6 mt-6 demo-text">
            <div>admin / <span>admin123</span></div>
            <div>manager / <span>manager123</span></div>
        </div>
    </div>
    <script>
        const users = {
            admin: { username: "admin", password: "admin123", role: "admin" },
            manager: { username: "manager", password: "manager123", role: "manager" }
        };
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('pssms_theme') === 'dark') {
            document.documentElement.classList.add('dark');
            themeToggle.checked = true;
        } else {
            document.documentElement.classList.add('dark');
            localStorage.setItem('pssms_theme', 'dark');
            themeToggle.checked = true;
        }
        themeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                document.documentElement.classList.add('dark');
                localStorage.setItem('pssms_theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('pssms_theme', 'light');
            }
        });
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const user = users[username];
            if (user && user.password === password) {
                localStorage.setItem('pssms_current_user', JSON.stringify({ username: user.username, role: user.role }));
                window.location.href = 'dashboard.html';
            } else {
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.textContent = 'Invalid credentials';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
